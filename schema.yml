components:
  schemas:
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    BlankEnum:
      enum:
      - ''
    CategoriaFinanceira:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        id_origem:
          type: string
          maxLength: 255
        descricao:
          type: string
          nullable: true
          maxLength: 255
        tipo:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoriaFinanceiraTipoEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        categoria_pai:
          type: string
          format: uuid
          nullable: true
        data_criacao:
          type: string
          format: date-time
          readOnly: true
      required:
      - data_criacao
      - id
      - id_origem
    CategoriaFinanceiraTipoEnum:
      enum:
      - Não identificado
      - Entradas
      - Saídas
      type: string
      description: |-
        * `Não identificado` - Nao Identificado
        * `Entradas` - Entradas
        * `Saídas` - Saidas
    ContaFinanceira:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        id_origem:
          type: string
          maxLength: 255
        agencia:
          type: string
          nullable: true
          maxLength: 255
        conta:
          type: string
          nullable: true
          maxLength: 255
        digito_verificador:
          type: string
          nullable: true
          maxLength: 10
        descricao:
          type: string
          nullable: true
          maxLength: 255
        instituicao_financeira:
          type: string
          format: uuid
          nullable: true
        data_criacao:
          type: string
          format: date-time
          readOnly: true
      required:
      - data_criacao
      - id
      - id_origem
    Estoque:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        produto:
          type: string
          format: uuid
        quantidade:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        reservado:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        preco_venda:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        loja:
          type: string
          format: uuid
          nullable: true
        data_criacao:
          type: string
          format: date-time
      required:
      - id
      - preco_venda
      - produto
      - quantidade
      - reservado
    EstoqueBI:
      type: object
      properties:
        loja:
          type: string
          maxLength: 255
        mes:
          type: string
          maxLength: 3
        ano:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        codigo:
          type: string
          maxLength: 255
        imposto:
          type: string
          format: decimal
        estoque_custo_unit:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,6})?$
        estoque_pecas:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,6})?$
        custo_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,6})?$
        estoque_vlr:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,6})?$
        data:
          type: string
          format: date
      required:
      - ano
      - codigo
      - custo_total
      - data
      - estoque_custo_unit
      - estoque_pecas
      - estoque_vlr
      - imposto
      - loja
      - mes
    FormaPagamento:
